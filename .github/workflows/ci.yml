name: CI
 
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
 
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install linting tools
        run: pip install ruff black
 
      - name: Check formatting (black)
        if: hashFiles('notebooks/**') != ''
        run: black --check notebooks/
 
      - name: Lint (ruff)
        if: hashFiles('notebooks/**') != ''
        run: ruff check notebooks/
 
      # Databricks Asset Bundle validation will be added here in a later
      # phase, once the pipeline/job definitions are moved into
      # databricks.yml — this currently only lints notebook source code.
